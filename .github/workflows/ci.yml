name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One run per branch/PR; newer commits cancel older in-progress runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: monix_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d monix_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      # config.settings reads DATABASE_URL (see core/config/settings.py)
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/monix_test
      DJANGO_SECRET_KEY: ci-django-secret-not-for-production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt', 'pyproject.toml') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install ".[dev]" -r requirements.txt

      - name: Run tests
        run: >-
          python -m pytest tests/
          --cov=scan_engine --cov=reports
          --cov-report=term-missing

      - name: Verify deployment files
        run: |
          test -f requirements.txt
          test -f core/manage.py
          python -m py_compile core/manage.py

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('web/bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build production bundle
        working-directory: web
        run: bun run build
        env:
          NEXT_PUBLIC_DJANGO_URL: ${{ secrets.NEXT_PUBLIC_DJANGO_URL || 'http://localhost:8000' }}
