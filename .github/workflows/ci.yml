name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One run per branch/PR; newer commits cancel older in-progress runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web Lint, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('web/bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Run lint
        working-directory: web
        run: bun run lint

      - name: Run tests
        working-directory: web
        env:
          SUPABASE_URL: https://ci-placeholder.supabase.co
          SUPABASE_JWT_AUD: authenticated
        run: |
          export SUPABASE_JWT_SECRET="$(openssl rand -hex 32)"
          bun run test

      - name: Build production bundle
        working-directory: web
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          SUPABASE_URL: https://ci-placeholder.supabase.co
          SUPABASE_JWT_AUD: authenticated
        run: |
          export SUPABASE_JWT_SECRET="$(openssl rand -hex 32)"
          bun run build
